<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Bill Calculator</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Minimal Custom CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-primary bg-opacity-50">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">

        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4">

            <h2 class="text-center text-primary fw-bold mb-2">
              Travel Bill Calculator
            </h2>

            <p class="text-center text-muted mb-4">
              Calculate travel fare based on distance covered
            </p>

            <!-- Input -->
            <div class="mb-3">
              <label for="kmInput" class="form-label fw-semibold">
                Kilometers Covered
              </label>

              <input
                type="number"
                id="kmInput"
                class="form-control form-control-lg"
                placeholder="Enter kilometres"
                min="0"
                step="0.1"
              />

              <div id="errorMessage" class="text-danger mt-2"></div>
            </div>

            <!-- Button -->
            <div class="d-grid mb-4">
              <button id="calculateBtn" class="btn btn-primary btn-lg">
                Calculate Bill
              </button>
            </div>

            <!-- Result -->
            <div id="resultCard" class="card bg-light border-0 d-none">
              <div class="card-body">

                <h4 class="fw-bold mb-3">
                  Total Bill =
                  <span id="totalBill" class="text-success">
                    Rs. 0
                  </span>
                </h4>

                <h5 class="mb-3">Calculation Breakdown</h5>

                <div id="breakdown"></div>

              </div>
            </div>

            <!-- Fare Slabs -->
            <div class="alert alert-info mt-4 mb-0">
              <h6 class="fw-bold">Fare Slabs</h6>

              <ul class="mb-0">
                <li>First 10 km → Rs.11 / km</li>
                <li>Next 40 km → Rs.10 / km</li>
                <li>Beyond 50 km → Rs.8 / km</li>
              </ul>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>

</body>
</html>
