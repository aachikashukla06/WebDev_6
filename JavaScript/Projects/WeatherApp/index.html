<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background-image: linear-gradient(
            rgba(16, 24, 40, 0.55),
            rgba(25, 47, 89, 0.7)
          ),
          url("https://img.magnific.com/free-vector/sky-with-anime-fluffy-curve-shaped-clouds-cartoon-vector-illustration-sunny-summer-day-cloudy-heaven-background-with-blue-pink-gradient-color-panoramic-air-landscape-clear-weather_107791-24304.jpg?semt=ais_hybrid&w=740&q=80");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }

      /* Main Glassmorphism Card */
      .container {
        max-width: 500px;
        margin-top: 50px;
        padding: 25px;

        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;

        box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.3);

        transition: 0.4s;
      }

      .container:hover {
        transform: translateY(-4px);
      }

      /* Input */
      input {
        border-radius: 12px !important;
        border: none;
        padding: 12px !important;
        box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.2);
      }

      input:focus {
        box-shadow: 0px 0px 12px rgba(13, 202, 240, 0.8) !important;
      }

      /* Button */
      button {
        border-radius: 12px !important;
        font-weight: bold !important;
        letter-spacing: 1px;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0px 0px 15px rgba(13, 202, 240, 0.7);
      }

      /* Header */
      header {
        backdrop-filter: blur(10px);
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.4);
      }

      h2 {
        letter-spacing: 2px;
        font-weight: bold;
      }

      /* Weather Icon */
      .weather-icon {
        font-size: 80px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-8px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      /* Weather Info Boxes */
      .info-box {
        background: rgba(255, 255, 255, 0.12);
        padding: 12px;
        margin-top: 15px;
        border-radius: 15px;

        border: 1px solid rgba(255, 255, 255, 0.15);

        transition: 0.3s;
      }

      .info-box:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.02);
      }

      h4 {
        font-size: 20px;
      }

      /* Footer */
      .footer-text {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 25px;
      }

      /* City Name */
      #cityDisplay {
        font-weight: bold;
        letter-spacing: 2px;
      }
    </style>
  </head>

  <body class="text-light">

    <!-- Header -->
    <header class="bg-info p-3 text-center shadow">
      <h2 class="m-0">
        <i class="bi bi-cloud-sun-fill"></i>
        Weather Forecast App
      </h2>
    </header>

    <!-- Main -->
    <main>
      <div class="container text-center">

        <!-- Animated Weather Icon -->
        <div class="weather-icon mb-3">
          ☁️
        </div>

        <!-- Input -->
        <div class="mb-4">
          <input
            type="text"
            id="cityName"
            class="form-control"
            placeholder="Enter City Name"
          />
        </div>



        <!-- Button -->
        <div>
          <button
            class="btn btn-info px-4 py-2"
            onclick="getWeather()"
          >
            <i class="bi bi-search"></i>
            GET WEATHER
          </button>
        </div>

        <!-- City Name -->
        <h3 class="mt-4" id="cityDisplay">
          📍Weather Today
        </h3>

        <!-- Temperature -->
        <div class="info-box">
          <h4>
            🌡️ Temp:
            <span id="Temperature">30</span>°C
          </h4>
        </div>


        <!-- Humidity -->
        <div class="info-box">
          <h4>
            💧 Humidity:
            <span id="Humidity">30</span>%
          </h4>
        </div>

        <!-- Wind -->
        <div class="info-box">
          <h4>
            💨 Wind Speed:
            <span id="Wind">12</span> km/h
          </h4>
        </div>

        <!-- Weather Condition -->
        <div class="info-box ">
          <h4>
            ☁️ Condition:
            <span id="Condition">Sunny</span>
          </h4>
        </div>

        <!-- Footer -->
        <p class="footer-text">
          Designed and Developed by Aanya ❤️
        </p>

      </div>
    </main>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="script.js"></script>
  </body>
</html>
