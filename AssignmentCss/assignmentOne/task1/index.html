<!DOCTYPE html>
<html>
<head>
<title>Enquiry Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Enquiry Form</h1>

<p>Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.</p>

<form>
<table cellpadding="10" cellspacing="0" >

<tr>
<td colspan="2">
<label>Person Name*</label><br>
<input type="text" placeholder="Person Name">
</td>

<td colspan="2">
<label>Contact Number*</label><br>
<input type="text" placeholder="Contact Number">
</td>
</tr>

<tr>
<td colspan="3">
<label>Email*</label><br>
<input type="email" placeholder="Email">
</td>

<td>
<label>Qualification*</label><br>
<input type="text" placeholder="Qualification">
</td>
</tr>

<tr>
<td colspan="4">
<label>College Name*</label><br>
<input type="text" placeholder="College Name">
</td>
</tr>

<tr>
<td colspan="2">
<label>Year*</label><br>
<select>
<option>Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</td>

<td colspan="2">
<label>Branch*</label><br>
<input type="text" placeholder="Branch">
</td>
</tr>

<tr>
<td colspan="2">
<label>Interested in Which Course*</label>

<div class="checkbox-group">
<label><input type="checkbox"> Full Stack Web Development</label>
<label><input type="checkbox"> Data Science with Python</label>
<label><input type="checkbox"> Data Analytics with Python</label>
<label><input type="checkbox"> Business Analyst</label>
<label><input type="checkbox"> Java Programming</label>
<label><input type="checkbox"> Python Programming</label>
<label><input type="checkbox"> C/C++ Programming</label>
<label><input type="checkbox"> Other</label>
</div>

</td>

<td colspan="2">

<label>Source of Information</label><br>
<select>
<option>Source of Information</option>
<option>Newspaper</option>
<option>Friend</option>
<option>Workshop/seminar</option>
<option>Received Call from Institute</option>
<option>other</option>
</select>

<br><br>

<label>Name of Executive*</label><br>
<input type="text" placeholder="name of Executive">

</td>
</tr>

<tr>
<td class="submit-btn">
<button type="submit">Submit</button>
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
