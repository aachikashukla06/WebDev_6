<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login & Registration</title>

    <!-- Bootstrap Icons CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Login -->
      <div class="card">
        <h1>Login</h1>

        <div class="input-box">
          <span class="icon"><i class="bi bi-envelope"></i></span>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="input-box">
          <span class="icon"><i class="bi bi-lock"></i></span>
          <input
            type="password"
            id="loginPass"
            placeholder="Confirm a password"
          />
          <span class="eye" onclick="togglePassword('loginPass', this)">
            <i class="bi bi-eye"></i>
          </span>
        </div>

        <div class="options">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button>Login Now</button>

        <p class="bottom-text">
          Don’t have an account? <a href="#">Signup now</a>
        </p>
      </div>

      <!-- Register -->
      <div class="card">
        <h2>Registration</h2>

        <div class="input-box">
          <span class="icon"><i class="bi bi-person"></i></span>
          <input type="text" placeholder="Enter your name" />
        </div>

        <div class="input-box">
          <span class="icon"><i class="bi bi-envelope"></i></span>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="input-box">
          <span class="icon"><i class="bi bi-lock"></i></span>
          <input type="password" id="regPass" placeholder="Create a password" />
          <span class="eye" onclick="togglePassword('regPass', this)">
            <i class="bi bi-eye"></i>
          </span>
        </div>

        <div class="input-box">
          <span class="icon"><i class="bi bi-lock"></i></span>
          <input
            type="password"
            id="regConfirm"
            placeholder="Confirm a password"
          />
          <span class="eye" onclick="togglePassword('regConfirm', this)">
            <i class="bi bi-eye"></i>
          </span>
        </div>

        <div class="options">
          <label
            ><input type="checkbox" /> I accept all terms & conditions</label
          >
        </div>

        <button>Register Now</button>

        <p class="bottom-text">
          Already have an account? <a href="#">Login now</a>
        </p>
      </div>
    </div>


    <script>                                                                                         
      function togglePassword(id, el) {
        let input = document.getElementById(id);
        let icon = el.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
