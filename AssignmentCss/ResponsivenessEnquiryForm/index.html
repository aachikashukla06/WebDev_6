<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiry Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Enquiry Form</h1>
<p class="subtitle">
Have questions or need assistance? Fill out the form below to connect with our team.
</p>

<form class="form">

<div class="row">

<div class="input-group">
<label>Person Name*</label>
<input type="text" placeholder="Person Name">
</div>

<div class="input-group">
<label>Contact Number*</label>
<input type="text" placeholder="Contact Number">
</div>

</div>


<div class="row">

<div class="input-group">
<label>Email*</label>
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<label>Qualification*</label>
<input type="text" placeholder="Qualification">
</div>
    
</div>


<div class="input-group full">
<label>College/School Name*</label>
<input type="text" placeholder="College/School Name">
</div>


<div class="row">

<div class="input-group">
<label>Year*</label>
<select>
<option>Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

<div class="input-group">
<label>Branch*</label>
<input type="text" placeholder="Branch">
</div>

</div>


<div class="row">

<div class="input-group">
<label>Interested Course*</label>

<div class="checkbox-group">
<label><input type="checkbox"> Full Stack Web Development</label>
<label><input type="checkbox"> Data Science with Python</label>
<label><input type="checkbox"> Data Analytics</label>
<label><input type="checkbox"> Java Programming</label>
<label><input type="checkbox"> Python Programming</label>
<label><input type="checkbox"> C/C++ Programming</label>
</div>
</div>


<div class="input-group">
<label>Source of Information</label>
<select>
<option>Source of Information</option>
<option>Google</option>
<option>Friend</option>
<option>Social Media</option>
</select>

<label class="mt">Name of Executive*</label>
<select>
<option>Name of Executive</option>
<option>Executive 1</option>
<option>Executive 2</option>
</select>

</div>

</div>

<div class="submit-area">
<button type="submit">Submit</button>
</div>

</form>

</div>

</body>
</html>
