<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Cravings</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-5" style="background: var(--color-primary); height:64px;">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold fs-4 text-white" href="index.html">
      crav<span style="color:#84cc16">/</span>ng
    </a>

    <div class="ms-auto d-flex gap-3">
      <a href="login.html" class="btn btn-outline-light rounded-pill px-4">Login</a>
      <a href="register.html" class="btn btn-outline-light rounded-pill px-4">Register</a>
    </div>

  </div>
</nav>

<!-- MAIN -->
<div class="container-fluid p-0">

  <div class="row g-0" style="height: calc(100vh - 64px);">

    <!-- LEFT IMAGE -->
    <div class="col-lg-8 d-none d-lg-block"
      style="background:url('https://images.unsplash.com/photo-1490645935967-10de6ba17061') center/cover;">
    </div>

    <!-- RIGHT FORM -->
    <div class="col-lg-4 d-flex align-items-center justify-content-center"
         style="background: var(--color-base-100);">

      <div class="bg-white p-4 rounded shadow" style="width: 400px;">

        <h3 class="fw-bold text-center mb-1" style="color: var(--color-primary);">
          Create Account
        </h3>

        <p class="text-muted text-center mb-3">
          Join us as a Customer, Restaurant, or Rider
        </p>
        <!-- USER TYPE -->
        <!-- <div class="mb-3">
          <label class="form-label fw-semibold">Register as:</label><br>

          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" >
           <span>Customer</span>
          </div>

          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" >
           <span>Restaurant</span>
          </div>

          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio">
           <span>Rider</span>
          </div>
        </div> -->

        

<div class="mb-3">
   <input type="radio" name="user_type" value="Customer">
    <span>Customer</span>

    <input type="radio" name="user_type" value="Restaurant">
    <span>Restaurant</span>
    <input type="radio" name="user_type" value="Rider">
    <span>Rider</span>
    <br/>
    <hr/>

</div>

<!-- INPUTS -->
        <input type="text" class="form-control mb-3" placeholder="Enter your full name">
        <input type="email" class="form-control mb-3" placeholder="Enter your email">
        <input type="text" class="form-control mb-3" placeholder="Enter your phone number">
        <input type="password" class="form-control mb-3" placeholder="Enter your password">
        <input type="password" class="form-control mb-3" placeholder="Confirm your password">

        <!-- TERMS -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label small">
            I agree to the <span style="color: var(--color-primary);">terms and conditions</span>.
          </label>
        </div>

        <!-- BUTTON -->
        <button class="btn w-100 text-white fw-semibold mb-3"
                style="background: var(--color-primary);">
          Register
        </button>

        <!-- LOGIN LINK -->
        <div class="text-center small">
          Already registered?
          <a href="login.html" style="color: var(--color-primary); font-weight:500;">
            Login here
          </a>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
