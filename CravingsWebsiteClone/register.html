<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register - Cravings</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
 <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top px-4">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="index.html">
      crav<span class="text-warning">/</span>ng
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <a href="login.html" class="text-white me-3 text-decoration-none">Login</a>
      <a href="register.html" class="btn btn-light rounded-pill">Register</a>
    </div>

  </div>
</nav>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top px-4">
  <a class="navbar-brand fw-bold" href="index.html">
    crav<span class="text-warning">/</span>ng
  </a>

  <div class="ms-auto">
    <a href="login.html" class="text-white me-3 text-decoration-none">Login</a>
    <a href="register.html" class="btn btn-light rounded-pill">Register</a>
  </div>
</nav>

<!-- REGISTER SECTION -->
<div class="container-fluid">
  <div class="row vh-100">

    <!-- LEFT FORM -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <div class="w-75">

        <h3 class="fw-bold mb-3">Create Account</h3>

        <!-- USER TYPE -->
        <div class="btn-group w-100 mb-3">
          <button class="btn btn-primary-custom">Customer</button>
          <button class="btn btn-outline-secondary">Restaurant</button>
          <button class="btn btn-outline-secondary">Rider</button>
        </div>

        <form>
          <input type="text" class="form-control mb-2" placeholder="Full Name">
          <input type="email" class="form-control mb-2" placeholder="Email">
          <input type="text" class="form-control mb-2" placeholder="Phone Number">
          <input type="password" class="form-control mb-2" placeholder="Password">
          <input type="password" class="form-control mb-3" placeholder="Confirm Password">

          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input">
            <label class="form-check-label">
              I agree to <a href="terms-of-service.html">Terms & Conditions</a>
            </label>
          </div>

          <button class="btn btn-primary-custom w-100">Create Account</button>
        </form>

        <p class="mt-3 text-center">
          Already have an account?
          <a href="login.html">Login</a>
        </p>

      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center text-white" style="background: var(--color-primary);">
      <div class="text-center">
        <i class="bi bi-person-plus display-1"></i>
        <h2 class="fw-bold mt-3">Join Cravings Today!</h2>
        <p>Order food, partner or become a rider</p>
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
