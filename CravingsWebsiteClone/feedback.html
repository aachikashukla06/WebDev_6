<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body style="background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;">

<div class="container vh-100 d-flex justify-content-end align-items-center">
  <div class="bg-white p-4 rounded shadow w-100" style="max-width:400px;">
    <h3>Feedback</h3>

    <input class="form-control mb-2" placeholder="Name">
    <input class="form-control mb-2" placeholder="Email">

    <select class="form-control mb-2">
      <option>Food Quality</option>
      <option>Delivery</option>
    </select>

    <p>⭐⭐⭐⭐⭐</p>

    <textarea class="form-control mb-3" rows="4" placeholder="--Give Your Feedback here--"></textarea>

    <button class="btn btn-danger btn-custom w-100">Submit</button>
  </div>
</div>

</body>
</html>
