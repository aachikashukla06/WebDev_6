<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body style="background:url('https://images.unsplash.com/photo-1498654896293-37aacf113fd9') center/cover;">

<div class="container vh-100 d-flex align-items-center">
  <div class="bg-light p-4 rounded shadow w-100" style="max-width:400px;">
    <h3 >Contact Us </h3>

    <input class="form-control mb-3" placeholder="Full Name">
    <input class="form-control mb-2" placeholder="Email">
    <input class="form-control mb-2" placeholder="Phone">
    <input class="form-control mb-2" placeholder="Subject">
    <textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>

    <button class="btn btn-danger btn-custom w-100">Send</button>
  </div>
</div>

</body>
</html>
