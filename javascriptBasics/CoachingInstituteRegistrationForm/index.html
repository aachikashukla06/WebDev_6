<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Coaching Institute Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="text-center mb-4">
                Coaching Institute Registration Form
            </h2>

            <form id="registrationForm">

                <!-- Personal Information -->
                <h5 class="mb-3 text-primary">1. Personal Information</h5>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName">
                    <small class="text-danger" id="fullNameError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email">
                    <small class="text-danger" id="emailError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" class="form-control" id="mobile">
                    <small class="text-danger" id="mobileError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="dob">
                    <small class="text-danger" id="dobError"></small>
                </div>

                <!-- Academic Details -->
                <h5 class="mb-3 text-primary">2. Academic Details</h5>

                <div class="mb-3">
                    <label class="form-label">
                        Last Completed Qualification
                    </label>

                    <select class="form-select" id="qualification">
                        <option value="">Select Qualification</option>
                        <option>10th</option>
                        <option>12th</option>
                        <option>Graduate</option>
                        <option>Postgraduate</option>
                    </select>

                    <small class="text-danger" id="qualificationError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Percentage / Grade
                    </label>

                    <input type="text" class="form-control" id="grade">

                    <small class="text-danger" id="gradeError"></small>
                </div>

                <!-- Course Information -->
                <h5 class="mb-3 text-primary">3. Course Information</h5>

                <div class="mb-3">
                    <label class="form-label">Preferred Course</label>

                    <select class="form-select" id="course">
                        <option value="">Select Course</option>
                        <option>IIT-JEE</option>
                        <option>NEET</option>
                        <option>Banking Exams</option>
                        <option>UPSC</option>
                        <option>SSC</option>
                    </select>

                    <small class="text-danger" id="courseError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Batch Timing Preference
                    </label>

                    <select class="form-select" id="batch">
                        <option value="">Select Batch</option>
                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option>Evening</option>
                        <option>Weekend</option>
                    </select>

                    <small class="text-danger" id="batchError"></small>
                </div>

                <!-- Address -->
                <h5 class="mb-3 text-primary">4. Address</h5>

                <div class="mb-3">
                    <label class="form-label">
                        Residential Address
                    </label>

                    <textarea class="form-control" rows="3" id="address"></textarea>

                    <small class="text-danger" id="addressError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">City</label>

                    <input type="text" class="form-control" id="city">

                    <small class="text-danger" id="cityError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pin Code</label>

                    <input type="text" class="form-control" id="pincode">

                    <small class="text-danger" id="pincodeError"></small>
                </div>

                <!-- Guardian Details -->
                <h5 class="mb-3 text-primary">5. Guardian Details</h5>

                <div class="mb-3">
                    <label class="form-label">
                        Guardian's Full Name
                    </label>

                    <input type="text" class="form-control" id="guardianName">

                    <small class="text-danger" id="guardianNameError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Guardian's Contact Number
                    </label>

                    <input type="text" class="form-control" id="guardianMobile">

                    <small class="text-danger" id="guardianMobileError"></small>
                </div>

                <!-- Additional Information -->
                <h5 class="mb-3 text-primary">6. Additional Information</h5>

                <div class="mb-3">
                    <label class="form-label">
                How Did You Hear About Us?
                From Where Did you get to know about our institute?
                    </label>

                    <select class="form-select" id="reference">
                        <option value="">Select Option</option>
                        <option>Friends</option>
                        <option>Online Ad</option>
                        <option>Newspaper</option>
                        <option>Social Media</option>
                        <option>Others</option>
                    </select>

                    <small class="text-danger" id="referenceError"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Special Requirements (Optional)
                    </label>

                    <textarea class="form-control" rows="3" id="requirements"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Submit Registration
                </button>

            </form>

            <div class="alert alert-success mt-4 d-none" id="successMessage">
                Registration submitted successfully!
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
