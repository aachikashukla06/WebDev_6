<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Currency Converter</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" />
    <script src="script.js"></script>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        font-family: Arial, sans-serif;
      }

      .converter-card {
        width: 100%;
        max-width: 900px;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .card-header-custom {
        background: linear-gradient(to right, #2563eb, #7c3aed);
        color: white;
        text-align: center;
        padding: 30px;
      }

      .card-header-custom h1 {
        font-weight: bold;
        margin-bottom: 10px;
      }

      .flag-img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid white;
        background: white;
        transition: 0.3s;
      }

      .swap-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        font-size: 24px;
      }

      .result-box {
        background: #f8fafc;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
      }

      .result-box h2 {
        font-weight: bold;
        color: #0f172a;
      }

      .error-message {
        color: red;
        font-size: 14px;
        margin-top: 5px;
      }

      @media (max-width: 600px) {
        .swap-wrapper {
          margin: 20px 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="converter-card">

      <!-- Header -->
      <div class="card-header-custom">
        <h1><i class="bi bi-currency-exchange"></i> Currency Converter</h1>
        <p class="mb-0">
          Live Exchange Rates | 200+ Currencies | Free & Fast
        </p>
      </div>

      <!-- Body -->
      <div class="p-4 p-md-5">

        <!-- Amount -->
        <div class="mb-4">
          <label class="form-label fw-bold text-white">
            Enter Amount
          </label>

          <input
            type="number"
            id="orgAmount"
            class="form-control form-control-lg"
            placeholder="Enter amount"
          />

          <div id="amountError" class="error-message"></div>
        </div>

        <!-- Countries -->
        <div class="row align-items-center">

          <!-- From -->
          <div class="col-md-5">
            <div class="text-center mb-3">
              <img
                id="flag1"
                class="flag-img"
                src="https://flagsapi.com/US/flat/64.png"
                alt="flag"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44386.png'"
              />
            </div>

            <label class="form-label fw-bold text-white">
              From
            </label>

            <select id="country1" class="form-select form-select-lg">
              <option value="">Select Country</option>
            </select>

            <div id="country1Error" class="error-message"></div>
          </div>

          <!-- Swap -->
          <div
            class="col-md-2 text-center swap-wrapper d-flex justify-content-center"
          >
            <button
              class="btn btn-warning swap-btn shadow"
              id="swapBtn"
            >
              <i class="bi bi-arrow-left-right"></i>
            </button>
          </div>

          <!-- To -->
          <div class="col-md-5">
            <div class="text-center mb-3">
              <img
                id="flag2"
                class="flag-img"
                src="https://flagsapi.com/IN/flat/64.png"
                alt="flag"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44386.png'"
              />
            </div>

            <label class="form-label fw-bold text-white">
              To
            </label>

            <select id="country2" class="form-select form-select-lg">
              <option value="">Select Country</option>
            </select>

            <div id="country2Error" class="error-message"></div>
          </div>
        </div>

        <!-- Convert Button -->
        <div class="text-center mt-5">
          <button
            class="btn btn-primary btn-lg px-5 shadow"
            id="convertBtn"
          >
            Convert
          </button>
        </div>

        <!-- Loading -->
        <div
          class="text-center mt-3 text-warning fw-bold"
          id="loadingText"
        ></div>

        <!-- Result -->
        <div class="result-box mt-4">
          <p class="text-muted mb-1">Converted Amount</p>

          <h2 id="newAmount">0.00</h2>

          <p class="mb-0 text-secondary" id="rateInfo"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
