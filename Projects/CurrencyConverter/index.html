<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Currency Converter</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="script" href="script.js">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Roboto', Arial, sans-serif;
    }

    .converter-card {
      width: 100%;
      max-width: 900px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .card-header-custom {
      background: linear-gradient(to right, #2563eb, #7c3aed);
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card-header-custom h1 {
      font-weight: bold;
    }

    .flag-img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
      background: white;
    }

    .swap-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
    }

    .result-box {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .result-box h2 {
      font-weight: bold;
      color: #0f172a;
    }

    @media(max-width:600px) {
      .swap-wrapper {
        margin: 20px 0;
      }
    }
  </style>
</head>

<body>

  <div class="converter-card">

    <!-- Header -->
    <div class="card-header-custom">
      <h1>
        <i class="bi bi-currency-exchange"></i>
        Currency Converter
      </h1>



      <p class="mb-0">
       Convert currencies in real-time | Designed by  
      </p>
    </div>

    <!-- Body -->
    <div class="p-4 p-md-5">

      <!-- Amount -->
      <div class="mb-4">
        <label class="form-label fw-bold text-white">
          Enter Amount
        </label>

        <input
          type="number"
          id="orgAmount"
          class="form-control form-control-lg"
          placeholder="Enter amount"
        />
      </div>

      <!-- Countries -->
      <div class="row align-items-center">

        <!-- From -->
        <div class="col-md-5">

          <div class="text-center mb-3">
            <img
              id="flag1"
              class="flag-img"
              src="https://flagsapi.com/US/flat/64.png"
            />
          </div>
          
          <label class="form-label fw-bold text-white">
            From
          </label>
          <select
            id="country1"
            class="form-select form-select-lg"
            onchange="updateFlag(this,'flag1')"
          >

            <option value="usd,US" selected>
              United States (USD)
            </option>

            <option value="inr,IN">
              India(INR)
            </option>

            <option value="gbp,GB">
              United Kingdom (GBP)
            </option>

            <option value="eur,FR">
              Europe (EUR)
            </option>

            <option value="jpy,JP">
              Japan (JPY)
            </option>

            <option value="cad,CA">
              Canada (CAD)
            </option>

            <option value="aud,AU">
              Australia (AUD)
            </option>

            <option value="cny,CN">
              China (CNY)
            </option>

            <option value="aed,AE">
              UAE (AED)
            </option>

            <option value="sgd,SG">
              Singapore (SGD)
            </option>

            <option value="pkr,PK">
              Pakistan (PKR)
            </option>

            <option value="bdt,BD">
              Bangladesh (BDT)
            </option>

            <option value="npr,NP">
              Nepal (NPR)
            </option>

            <option value="lkr,LK">
              Sri Lanka (LKR)
            </option>

          </select>
        </div>

        <!-- Swap -->
        <div
          class="col-md-2 text-center swap-wrapper d-flex justify-content-center"
        >

          <button
            class="btn btn-warning swap-btn shadow"
            id="swapBtn"
          >
            <i class="bi bi-arrow-left-right"></i>
          </button>

        </div>

        <!-- To -->
        <div class="col-md-5">

          <div class="text-center mb-3">
            <img
              id="flag2"
              class="flag-img"
              src="https://flagsapi.com/IN/flat/64.png"
            />
          </div>

          <label class="form-label fw-bold text-white ">
            To
          </label>

          <select
            id="country2"
            class="form-select form-select-lg"
            onchange="updateFlag(this,'flag2')"
          >

            <option value="inr,IN" selected>
              India(INR)
            </option>

            <option value="usd,US">
              United States(USD)
            </option>

            <option value="gbp,GB">
              United Kingdom(GBP)
            </option>

            <option value="eur,FR">
              Europe(EUR)
            </option>

            <option value="jpy,JP">
              Japan(JPY)
            </option>

            <option value="cad,CA">
              Canada(CAD)
            </option>

            <option value="aud,AU">
              Australia(AUD)
            </option>

            <option value="cny,CN">
              China(CNY)
            </option>

            <option value="aed,AE">
              UAE(AED)
            </option>

            <option value="sgd,SG">
              Singapore(SGD)
            </option>

            <option value="pkr,PK">
              Pakistan(PKR)
            </option>

            <option value="bdt,BD">
              Bangladesh(BDT)
            </option>

            <option value="npr,NP">
              Nepal(NPR)
            </option>

            <option value="lkr,LK">
              Sri Lanka(LKR)
            </option>

          </select>
        </div>
      </div>

      <!-- Convert Button -->


      <div class="text-center mt-5">

        <button
          class="btn btn-primary btn-lg px-5 shadow"
          id="convertBtn"
        >
          Convert to currency
        </button>
      </div>

      <!-- Loading -->
      <div class="text-center mt-3 text-warning fw-bold"
        id="loadingText">
      </div>

    <!-- Result -->
    <div class="result-box mt-4">
        <p class="text-muted mb-1">
          Converted Amount     
        </p>
        <h2 id="newAmount">
          0.00
        </h2>

        <p
          class="mb-0 text-secondary"
          id="rateInfo"
        ></p>

      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
